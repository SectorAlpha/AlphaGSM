name: Build Runtime Family Images

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Runtime image version tag (defaults to short git SHA)
        required: false
        default: ""

jobs:
  build-runtime-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: java
            dockerfile: docker/java/Dockerfile
          - family: quake-linux
            dockerfile: docker/quake-linux/Dockerfile
          - family: service-console
            dockerfile: docker/service-console/Dockerfile
          - family: simple-tcp
            dockerfile: docker/simple-tcp/Dockerfile
          - family: steamcmd-linux
            dockerfile: docker/steamcmd-linux/Dockerfile
          - family: wine-proton
            dockerfile: docker/wine-proton/Dockerfile
          - family: docker
            dockerfile: docker/manager/Dockerfile
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo="ghcr.io/${owner}/alphagsm-${{ matrix.family }}-runtime"
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version=$(echo "${{ github.sha }}" | cut -c1-7)
          fi
          echo "image=${repo}:${version}" >> "$GITHUB_OUTPUT"
          echo "latest=${repo}:latest" >> "$GITHUB_OUTPUT"
          echo "Building ${repo}:${version} and ${repo}:latest"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runtime family image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          secrets: |
            gh_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

      - name: Set package visibility to public
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          package_name="alphagsm-${{ matrix.family }}-runtime"
          gh api --method PATCH \
            /orgs/${owner}/packages/container/${package_name} \
            --field visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}