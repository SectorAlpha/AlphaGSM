name: AlphaGSM PR

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Lint
        run: |
          bash ./lint.sh

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Unit Tests
        run: pytest tests -n auto

  coverage:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Coverage Report
        run: |
          pytest tests \
            --cov=core \
            --cov=downloader \
            --cov=downloadermodules \
            --cov=gamemodules \
            --cov=screen \
            --cov=server \
            --cov=utils \
            --cov-report=xml \
            -q --tb=no

  discover-smoke-tests:
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - id: set-matrix
        name: Split smoke scripts into max 20 batches
        run: |
          python3 - <<'PY'
          import json, math, os
          scripts = sorted(f for f in os.listdir("tests/smoke_tests") if f.startswith("run_") and f.endswith(".sh") and not f.startswith("run_backend_"))
          max_jobs = 20
          batch_size = math.ceil(len(scripts) / max_jobs)
          batches = []
          for i in range(0, len(scripts), batch_size):
              chunk = scripts[i:i+batch_size]
              batches.append({
                  "batch": i // batch_size + 1,
                  "scripts": " ".join(f"tests/smoke_tests/{s}" for s in chunk),
                  "label": f"batch-{i // batch_size + 1}-of-{math.ceil(len(scripts) / batch_size)}"
              })
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f'matrix={json.dumps({"include": batches})}\n')
          PY

  smoke-test:
    runs-on: ubuntu-latest
    needs: discover-smoke-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-smoke-tests.outputs.matrix) }}
    env:
      PYTHONPATH: .:src
    name: smoke-test (${{ matrix.label }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          # screen   — required by all smoke tests (AlphaGSM uses GNU screen as
          #            the process supervisor; smoke runners call require_cmd screen)
          # lib32*   — 32-bit Steam runtime (Source engine servers: TF2, CS:GO, …)
          # p7zip    — server archives distributed as .7z
          sudo apt-get install -y screen lib32gcc-s1 lib32stdc++6 p7zip-full
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: AlphaGSM Smoke Tests
        run: |
          touch smoke-results.txt
          passed=0
          failed=0
          for script in ${{ matrix.scripts }}; do
            echo ""
            echo "========================================"
            echo "Running: $script"
            echo "========================================"
            if bash "./$script"; then
              echo "PASSED: $script" | tee -a smoke-results.txt
              passed=$((passed + 1))
            else
              echo "FAILED: $script" | tee -a smoke-results.txt
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "$failed smoke test(s) failed"
            exit 1
          fi
      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.label }}
          path: smoke-results.txt

  discover-integration-tests:
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - id: set-matrix
        name: Split integration tests into max 20 batches
        run: |
          python3 - <<'PY'
          import json, math, os
          tests = sorted(f for f in os.listdir("tests/integration_tests") if f.startswith("test_") and f.endswith(".py"))
          max_jobs = 20
          batch_size = math.ceil(len(tests) / max_jobs)
          batches = []
          for i in range(0, len(tests), batch_size):
              chunk = tests[i:i+batch_size]
              batches.append({
                  "batch": i // batch_size + 1,
                  "files": " ".join(f"tests/integration_tests/{t}" for t in chunk),
                  "label": f"batch-{i // batch_size + 1}-of-{math.ceil(len(tests) / batch_size)}"
              })
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f'matrix={json.dumps({"include": batches})}\n')
          PY

  # ---------------------------------------------------------------------------
  # setup-integration-env: prepare the Wine prefix and Proton-GE install ONCE
  # per commit and save them to the Actions cache.  All 20 integration-test
  # batches then restore from that single cache entry instead of each spending
  # ~3 minutes repeating the same setup on 20 separate runners.
  # ---------------------------------------------------------------------------
  setup-integration-env:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4

      - name: Cache Wine prefix and Proton-GE
        id: cache-wine-proton
        uses: actions/cache@v4
        with:
          path: |
            ~/.wine
            ~/.local/share/proton-ge
          # Key tied to the workflow file + install script so any change to
          # setup steps automatically invalidates and regenerates the cache.
          key: wine-proton-${{ runner.os }}-v1-${{ hashFiles('.github/workflows/unittest.yaml', 'scripts/install_proton.sh') }}

      - name: Install Wine apt packages
        if: steps.cache-wine-proton.outputs.cache-hit != 'true'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32:i386 winetricks

      - name: Initialise Wine prefix
        if: steps.cache-wine-proton.outputs.cache-hit != 'true'
        run: |
          export DISPLAY="" WINEDLLOVERRIDES="winex11.drv=" WINEDEBUG=-all
          wineboot --init
          winetricks -q win10
          # --force bypasses the stale SHA256 check; || true keeps it non-fatal
          winetricks -q --force vcrun2019 || true
          echo "==> Wine prefix ready: $(wine --version)"

      - name: Install Proton-GE
        if: steps.cache-wine-proton.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/install_proton.sh proton

  integration-test:
    runs-on: ubuntu-latest
    needs: [discover-integration-tests, setup-integration-env]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-integration-tests.outputs.matrix) }}
    env:
      PYTHONPATH: .:src
    name: integration-test (${{ matrix.label }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore Wine prefix and Proton-GE from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.wine
            ~/.local/share/proton-ge
          key: wine-proton-${{ runner.os }}-v1-${{ hashFiles('.github/workflows/unittest.yaml', 'scripts/install_proton.sh') }}
          # fail-on-cache-miss ensures setup-integration-env ran successfully;
          # if the cache is somehow absent the batch would fail in an obvious way.
          fail-on-cache-miss: true
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          # screen     — AlphaGSM process supervisor (conftest writes screenrc
          #              and launches game servers through screen)
          # lib32*     — 32-bit Steam runtime (Source engine servers)
          # p7zip      — server archives distributed as .7z
          # wine64 / wine32:i386 / winetricks
          #            — Wine BINARY needed even though the prefix comes from
          #              cache; the exe itself must be on PATH on every runner
          sudo apt-get install -y \
            screen \
            lib32gcc-s1 lib32stdc++6 \
            p7zip-full \
            wine64 wine32:i386 winetricks
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: AlphaGSM Pytest Integration Tests
        env:
          ALPHAGSM_RUN_INTEGRATION: "1"
          ALPHAGSM_RUN_STEAMCMD: "1"
        run: pytest -rs --junit-xml=results.xml ${{ matrix.files }}
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results-${{ matrix.label }}
          path: results.xml

  backend-smoke-test:
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      PYTHONPATH: .:src
    name: backend-smoke-test
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Backend Smoke Tests
        run: |
          failed=0
          for script in tests/smoke_tests/run_backend_*.sh; do
            echo ""
            echo "========================================"
            echo "Running: $script"
            echo "========================================"
            if ! bash "./$script"; then
              echo "FAILED: $script"
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "$failed backend smoke test(s) failed"
            exit 1
          fi

  backend-integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      PYTHONPATH: .:src
    name: backend-integration-test
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Backend Integration Tests
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
        run: pytest tests/backend_integration_tests/ -v

  windows-minecraft-integration:
    runs-on: windows-latest
    needs: unit-test
    env:
      PYTHONPATH: .;src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Windows Minecraft Integration Test
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
        run: pytest tests/backend_integration_tests/test_minecraft_windows_container.py -v

  macos-minecraft-integration:
    runs-on: macos-latest
    needs: unit-test
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: macOS Minecraft Integration Test
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
        run: pytest tests/backend_integration_tests/test_minecraft_macos.py -v

  summarize-tests:
    runs-on: ubuntu-latest
    needs: [smoke-test, integration-test]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: "*-results-*"
          path: artifacts
          merge-multiple: false
      - name: Summarize test results
        run: |
          python3 - <<'PYEOF'
          import glob, xml.etree.ElementTree as ET

          smoke_passed, smoke_failed = [], []
          int_passed, int_skipped, int_failed = [], [], []

          for txt in sorted(glob.glob("artifacts/smoke-results-*/*.txt")):
              for line in open(txt):
                  line = line.strip()
                  if line.startswith("PASSED: "):
                      smoke_passed.append(line[8:])
                  elif line.startswith("FAILED: "):
                      smoke_failed.append(line[8:])

          for xml_file in sorted(glob.glob("artifacts/integration-results-*/*.xml")):
              try:
                  root = ET.parse(xml_file).getroot()
              except ET.ParseError:
                  continue
              for tc in root.iter("testcase"):
                  name = tc.attrib.get("classname", "") + "::" + tc.attrib.get("name", "")
                  skip = tc.find("skipped")
                  fail = tc.find("failure")
                  err = tc.find("error")
                  if skip is not None:
                      int_skipped.append((name, skip.attrib.get("message", "").split("\n")[0]))
                  elif fail is not None or err is not None:
                      node = fail if fail is not None else err
                      int_failed.append((name, node.attrib.get("message", "").split("\n")[0]))
                  else:
                      int_passed.append(name)

          SEP = "=" * 64
          print(SEP)
          print("AlphaGSM Test Summary")
          print(SEP)

          print("\nSMOKE TESTS")
          print(f"  Passed : {len(smoke_passed)}")
          print(f"  Failed : {len(smoke_failed)}")
          if smoke_passed:
              print("\n  Passed:")
              for t in smoke_passed:
                  print(f"    PASS  {t}")
          if smoke_failed:
              print("\n  Failed:")
              for t in smoke_failed:
                  print(f"    FAIL  {t}")

          print("\nINTEGRATION TESTS")
          print(f"  Passed  : {len(int_passed)}")
          print(f"  Skipped : {len(int_skipped)}")
          print(f"  Failed  : {len(int_failed)}")
          if int_passed:
              print("\n  Passed (server launched successfully):")
              for t in int_passed:
                  print(f"    PASS  {t}")
          if int_skipped:
              print("\n  Skipped:")
              for t, r in int_skipped:
                  print(f"    SKIP  {t}")
                  if r:
                      print(f"          Reason: {r}")
          if int_failed:
              print("\n  Failed:")
              for t, r in int_failed:
                  print(f"    FAIL  {t}")
                  if r:
                      print(f"          Reason: {r}")

          total_p = len(smoke_passed) + len(int_passed)
          total_s = len(int_skipped)
          total_f = len(smoke_failed) + len(int_failed)
          print("\n" + SEP)
          print(f"OVERALL  passed={total_p}  skipped={total_s}  failed={total_f}")
          print(SEP)
          PYEOF