name: AlphaGSM PR

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Lint
        run: |
          ruff check \
            core/multiplexer.py \
            gamemodules/teamfortress2.py \
            tests/test_init.py \
            utils/steamcmd.py

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Unit Tests with Coverage
        run: |
          pytest tests \
            --cov=core \
            --cov=downloader \
            --cov=downloadermodules \
            --cov=gamemodules \
            --cov=screen \
            --cov=server \
            --cov=utils \
            --cov-report=term-missing \
            --cov-report=xml
