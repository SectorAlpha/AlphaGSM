name: AlphaGSM PR

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Lint
        run: |
          bash ./lint.sh

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Unit Tests with Coverage
        run: |
          pytest tests \
            --cov=core \
            --cov=downloader \
            --cov=downloadermodules \
            --cov=gamemodules \
            --cov=screen \
            --cov=server \
            --cov=utils \
            --cov-report=term-missing \
            --cov-report=xml

  smoke-test:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - game-server: minecraft
            smoke-script: smoke_tests/run_minecraft_vanilla.sh
          - game-server: tf2
            smoke-script: smoke_tests/run_tf2.sh
    env:
      PYTHONPATH: .
    name: smoke-test (${{ matrix.game-server }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install SteamCMD runtime dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1 lib32stdc++6
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: AlphaGSM Smoke Test Runner
        run: bash ./${{ matrix.smoke-script }}

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - game-server: minecraft
            test-file: integration_tests/test_minecraft_vanilla.py
          - game-server: tf2
            test-file: integration_tests/test_tf2.py
    env:
      PYTHONPATH: .
    name: integration-test (${{ matrix.game-server }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install SteamCMD runtime dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1 lib32stdc++6
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: AlphaGSM Pytest Integration Test
        env:
          ALPHAGSM_RUN_INTEGRATION: "1"
        run: pytest ${{ matrix.test-file }}

  system-install-test:
    runs-on: ubuntu-latest
    needs: unit-test
    name: system-install-test
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Run system-wide install test in container
        run: |
          bash ./system_install_tests/run_system_install_in_container.sh
