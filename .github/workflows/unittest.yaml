name: AlphaGSM PR

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout AlphaGSM code
      uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .
    steps:
    - name: Checkout AlphaGSM code
      uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: AlphaGSM Unit Tests
      run: pytest

  smoke-test:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        game-server: [minecraft_vanilla, tf2]
    env:
      PYTHONPATH: .
    name: smoke-test (${{ matrix.game-server }})
    steps:
    - name: Checkout AlphaGSM code
      uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install SteamCMD runtime dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1 lib32stdc++6
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
    - name: AlphaGSM Smoke Test Runner
      run: bash ./smoke_tests/run_${{ matrix.game-server }}.sh

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        game-server: [minecraft_vanilla, tf2]
    env:
      PYTHONPATH: .
    name: integration-test (${{ matrix.game-server }})
    steps:
    - name: Checkout AlphaGSM code
      uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install SteamCMD runtime dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1 lib32stdc++6
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
    - name: AlphaGSM Pytest Integration Test
      env:
        ALPHAGSM_RUN_INTEGRATION: '1'
      run: pytest integration_tests/test_${{ matrix.game-server }}.py
