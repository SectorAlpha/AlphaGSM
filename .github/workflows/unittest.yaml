name: AlphaGSM PR

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Lint
        run: |
          bash ./lint.sh

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check canonical module parity report
        run: |
          python3 scripts/generate_module_parity_report.py --check
      - name: AlphaGSM Unit Tests
        run: pytest tests/unit_tests -n auto

  coverage:
    runs-on: ubuntu-latest
    needs: build
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: AlphaGSM Coverage Report
        run: |
          pytest tests/unit_tests \
            --cov=core \
            --cov=downloader \
            --cov=downloadermodules \
            --cov=gamemodules \
            --cov=screen \
            --cov=server \
            --cov=utils \
            --cov-report=xml \
            -q --tb=no

  binary-build-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: alphagsm-linux
            binary: dist-binary/alphagsm
          - os: windows-latest
            artifact: alphagsm-windows
            binary: dist-binary/alphagsm.exe
          - os: macos-latest
            artifact: alphagsm-macos
            binary: dist-binary/alphagsm
    runs-on: ${{ matrix.os }}
    needs: build
    name: binary-build-smoke (${{ matrix.os }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build standalone AlphaGSM binary
        env:
          ALPHAGSM_VERSION: ci-${{ github.sha }}
        run: >-
          python scripts/build_binary.py
          --version ci-${{ github.sha }}
          --release-dir release-artifacts
          --artifact-name ${{ matrix.artifact }}-${{ runner.arch }}
      - name: Run binary smoke check
        env:
          ALPHAGSM_CONFIG_LOCATION: ${{ github.workspace }}/tests/alphagsm-test.conf
        run: release-artifacts/${{ matrix.artifact }}-${{ runner.arch }}${{ endsWith(matrix.binary, '.exe') && '.exe' || '' }} --version
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ runner.arch }}
          path: release-artifacts/*

  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      game_test_mode: ${{ steps.classify.outputs.game_test_mode }}
      has_smoke_tests: ${{ steps.classify.outputs.has_smoke_tests }}
      has_integration_tests: ${{ steps.classify.outputs.has_integration_tests }}
      smoke_matrix: ${{ steps.classify.outputs.smoke_matrix }}
      integration_matrix: ${{ steps.classify.outputs.integration_matrix }}
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch PR base commit
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.sha }}"
      - id: classify
        name: Classify Linux game smoke and integration scope
        run: |
          python3 scripts/ci_game_test_routing.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

  discover-smoke-tests:
    runs-on: ubuntu-latest
    needs: [unit-test, lint, coverage, classify-changes]
    outputs:
      matrix: ${{ steps.forward.outputs.matrix }}
      has_tests: ${{ steps.forward.outputs.has_tests }}
    steps:
      - id: forward
        name: Forward Linux game smoke matrix
        run: |
          echo "Linux game smoke mode: ${{ needs.classify-changes.outputs.game_test_mode }}"
          echo "Smoke tests selected: ${{ needs.classify-changes.outputs.has_smoke_tests }}"
          echo 'matrix=${{ needs.classify-changes.outputs.smoke_matrix }}' >> "$GITHUB_OUTPUT"
          echo 'has_tests=${{ needs.classify-changes.outputs.has_smoke_tests }}' >> "$GITHUB_OUTPUT"

  smoke-test:
    runs-on: ubuntu-latest
    if: needs.discover-smoke-tests.outputs.has_tests == 'true'
    needs: discover-smoke-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-smoke-tests.outputs.matrix) }}
    env:
      PYTHONPATH: .:src
    name: smoke-test (${{ matrix.label }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install system dependencies
        run: |
          for apt_source in /etc/apt/sources.list.d/*; do
            if sudo test -f "$apt_source" && sudo grep -qE 'packages\.microsoft\.com|azure-cli|microsoft-prod' "$apt_source"; then
              sudo rm -f "$apt_source"
            fi
          done
          sudo dpkg --add-architecture i386
          sudo apt-get update
          # screen   — required by all smoke tests (AlphaGSM uses GNU screen as
          #            the process supervisor; smoke runners call require_cmd screen)
          # lib32*   — 32-bit Steam runtime (Source engine servers: TF2, CS:GO, …)
          # p7zip    — server archives distributed as .7z
          sudo apt-get install -y screen lib32gcc-s1 lib32stdc++6 p7zip-full
      - name: Install .NET 10 runtime for SS14 smoke coverage
        if: contains(matrix.scripts, 'tests/smoke_tests/run_ss14server.sh')
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb \
            -O /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          rm -f /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dotnet-runtime-10.0
      - name: Install Proton-GE for Sons Of The Forest smoke coverage
        if: contains(matrix.scripts, 'tests/smoke_tests/run_sonsoftheforestserver.sh')
        run: |
          bash scripts/install_proton.sh proton
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: AlphaGSM Smoke Tests
        run: |
          touch smoke-results.txt
          passed=0
          failed=0
          for script in ${{ matrix.scripts }}; do
            echo ""
            echo "========================================"
            echo "Running: $script"
            echo "========================================"
            if bash "./$script"; then
              echo "PASSED: $script" | tee -a smoke-results.txt
              passed=$((passed + 1))
            else
              echo "FAILED: $script" | tee -a smoke-results.txt
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "$failed smoke test(s) failed"
            exit 1
          fi
      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.label }}
          path: smoke-results.txt

  discover-integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-test, lint, coverage, classify-changes]
    outputs:
      matrix: ${{ steps.forward.outputs.matrix }}
      has_tests: ${{ steps.forward.outputs.has_tests }}
    steps:
      - id: forward
        name: Forward Linux game integration matrix
        run: |
          echo "Linux game integration mode: ${{ needs.classify-changes.outputs.game_test_mode }}"
          echo "Integration tests selected: ${{ needs.classify-changes.outputs.has_integration_tests }}"
          echo 'matrix=${{ needs.classify-changes.outputs.integration_matrix }}' >> "$GITHUB_OUTPUT"
          echo 'has_tests=${{ needs.classify-changes.outputs.has_integration_tests }}' >> "$GITHUB_OUTPUT"

  build-integration-image:
    runs-on: ubuntu-latest
    needs: [unit-test, lint, coverage]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4

      - name: Compute image tags from content hash
        id: meta
        run: |
          hash=$(cat .github/docker/integration-env/Dockerfile scripts/install_proton.sh requirements.txt | sha256sum | cut -c1-12)
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo="ghcr.io/${owner}/alphagsm-integration-test"
          echo "image=${repo}:${hash}" >> "$GITHUB_OUTPUT"
          echo "latest=${repo}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push integration test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/integration-env/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
          secrets: |
            gh_token=${{ secrets.GITHUB_TOKEN }}

  integration-test:
    runs-on: ubuntu-latest
    if: needs.discover-integration-tests.outputs.has_tests == 'true'
    needs: [discover-integration-tests, build-integration-image]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-integration-tests.outputs.matrix) }}
    container:
      image: ${{ needs.build-integration-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      PYTHONPATH: .:src
      WINEPREFIX: /opt/wine
    name: integration-test (${{ matrix.label }})
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: AlphaGSM Pytest Integration Tests
        env:
          ALPHAGSM_RUN_INTEGRATION: "1"
          ALPHAGSM_RUN_STEAMCMD: "1"
        run: |
          # Game servers that refuse to run as root (Insurgency: Sandstorm,
          # Mordhau, Squad, Palworld, Satisfactory, …) require a non-root uid.
          # Run the full pytest session as gsmuser (uid 1001) so every server
          # started by the tests inherits the non-root uid via screen.
          #
          # uid 1001 matches the GitHub Actions runner user that owns the
          # checked-out workspace, so no chown pass is needed.
          su - gsmuser -c "
            set -e
            cd '$GITHUB_WORKSPACE'
            export PYTHONPATH=.:src
            export ALPHAGSM_RUN_INTEGRATION=1
            export ALPHAGSM_RUN_STEAMCMD=1
            export WINEPREFIX=/opt/wine
            export WINEDEBUG=-all
            export WINEDLLOVERRIDES='winex11.drv='
            export SDL_VIDEODRIVER=offscreen
            export SDL_AUDIODRIVER=dummy
            export DISPLAY=
            python3 scripts/run_integration_batch_with_retry.py \
              --results-file results.xml \
              ${{ matrix.files }}
          "
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results-${{ matrix.label }}
          path: results.xml

  backend-smoke-test:
    runs-on: ubuntu-latest
    needs: [unit-test, lint, coverage, build-integration-image]
    env:
      PYTHONPATH: .:src
      ALPHAGSM_BACKEND_DOCKER_IMAGE: ${{ needs.build-integration-image.outputs.image }}
    name: backend-smoke-test
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install tmux
        run: |
          for apt_source in /etc/apt/sources.list.d/*; do
            if sudo test -f "$apt_source" && sudo grep -qE 'packages\.microsoft\.com|azure-cli|microsoft-prod' "$apt_source"; then
              sudo rm -f "$apt_source"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y tmux
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Backend Smoke Tests
        run: |
          failed=0
          for script in tests/smoke_tests/run_backend_*.sh; do
            echo ""
            echo "========================================"
            echo "Running: $script"
            echo "========================================"
            if ! bash "./$script"; then
              echo "FAILED: $script"
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "$failed backend smoke test(s) failed"
            exit 1
          fi

  backend-integration-test:
    runs-on: ubuntu-latest
    needs: [unit-test, lint, coverage, build-integration-image]
    env:
      PYTHONPATH: .:src
    name: backend-integration-test
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install tmux
        run: |
          for apt_source in /etc/apt/sources.list.d/*; do
            if sudo test -f "$apt_source" && sudo grep -qE 'packages\.microsoft\.com|azure-cli|microsoft-prod' "$apt_source"; then
              sudo rm -f "$apt_source"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y tmux
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Backend Integration Tests (screen, tmux, subprocess)
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
        run: |
          pytest \
            tests/backend_integration_tests/test_backend_port_manager.py \
            tests/backend_integration_tests/test_backend_screen.py \
            tests/backend_integration_tests/test_backend_tmux.py \
            tests/backend_integration_tests/test_backend_subprocess.py \
            tests/backend_integration_tests/test_backend_subprocess_integration.py \
            --junit-xml=backend-process-results.xml \
            -v
      - name: Backend Docker Integration Tests (active matrix cases)
        if: always()
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
          ALPHAGSM_BACKEND_DOCKER_IMAGE_JAVA: ${{ needs.build-integration-image.outputs.image }}
          ALPHAGSM_MANAGER_SERVER_IMAGE: ${{ needs.build-integration-image.outputs.image }}
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          export ALPHAGSM_WRAPPER_DOCKER_IMAGE_JAVA="ghcr.io/${owner}/alphagsm-java-runtime:latest"
          export ALPHAGSM_WRAPPER_DOCKER_IMAGE_QUAKE_LINUX="ghcr.io/${owner}/alphagsm-quake-linux-runtime:latest"
          export ALPHAGSM_WRAPPER_DOCKER_IMAGE_SERVICE_CONSOLE="ghcr.io/${owner}/alphagsm-service-console-runtime:latest"
          export ALPHAGSM_WRAPPER_DOCKER_IMAGE_SIMPLE_TCP="ghcr.io/${owner}/alphagsm-simple-tcp-runtime:latest"
          export ALPHAGSM_WRAPPER_DOCKER_IMAGE_STEAMCMD_LINUX="ghcr.io/${owner}/alphagsm-steamcmd-linux-runtime:latest"
          export ALPHAGSM_WRAPPER_DOCKER_IMAGE_WINE_PROTON="ghcr.io/${owner}/alphagsm-wine-proton-runtime:latest"
          pytest \
            tests/backend_integration_tests/test_backend_docker.py \
            tests/backend_integration_tests/test_backend_docker_manager.py \
            tests/backend_integration_tests/test_alphagsm_docker_wrapper.py \
            --junit-xml=backend-docker-results.xml \
            -v
      - name: Upload backend integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-results-linux
          path: |
            backend-process-results.xml
            backend-docker-results.xml

  windows-minecraft-integration:
    runs-on: windows-latest
    needs: [unit-test, lint, coverage]
    env:
      PYTHONPATH: .;src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Windows Minecraft Integration Test
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
        run: pytest tests/backend_integration_tests/test_minecraft_windows_container.py -v

  macos-minecraft-integration:
    runs-on: macos-latest
    needs: [unit-test, lint, coverage]
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout AlphaGSM code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: macOS Minecraft Integration Test
        env:
          ALPHAGSM_RUN_BACKEND_INTEGRATION: "1"
        run: pytest tests/backend_integration_tests/test_minecraft_macos.py -v

  summarize-tests:
    runs-on: ubuntu-latest
    needs: [smoke-test, integration-test, backend-integration-test]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: "*-results-*"
          path: artifacts
          merge-multiple: false
      - name: Summarize test results
        run: |
          python3 - <<'PYEOF'
          import glob, sys, xml.etree.ElementTree as ET

          smoke_passed, smoke_failed = [], []
          int_passed, int_skipped, int_failed = [], [], []
          backend_passed, backend_skipped, backend_failed = [], [], []

          for txt in sorted(glob.glob("artifacts/smoke-results-*/*.txt")):
              for line in open(txt):
                  line = line.strip()
                  if line.startswith("PASSED: "):
                      smoke_passed.append(line[8:])
                  elif line.startswith("FAILED: "):
                      smoke_failed.append(line[8:])

          for xml_file in sorted(glob.glob("artifacts/integration-results-*/*.xml")):
              try:
                  root = ET.parse(xml_file).getroot()
              except ET.ParseError:
                  continue
              for tc in root.iter("testcase"):
                  name = tc.attrib.get("classname", "") + "::" + tc.attrib.get("name", "")
                  skip = tc.find("skipped")
                  fail = tc.find("failure")
                  err = tc.find("error")
                  if skip is not None:
                      int_skipped.append((name, skip.attrib.get("message", "").split("\n")[0]))
                  elif fail is not None or err is not None:
                      node = fail if fail is not None else err
                      int_failed.append((name, node.attrib.get("message", "").split("\n")[0]))
                  else:
                      int_passed.append(name)

          for xml_file in sorted(glob.glob("artifacts/backend-integration-results-*/*.xml")):
              try:
                  root = ET.parse(xml_file).getroot()
              except ET.ParseError:
                  continue
              for tc in root.iter("testcase"):
                  name = tc.attrib.get("classname", "") + "::" + tc.attrib.get("name", "")
                  skip = tc.find("skipped")
                  fail = tc.find("failure")
                  err = tc.find("error")
                  if skip is not None:
                      backend_skipped.append((name, skip.attrib.get("message", "").split("\n")[0]))
                  elif fail is not None or err is not None:
                      node = fail if fail is not None else err
                      backend_failed.append((name, node.attrib.get("message", "").split("\n")[0]))
                  else:
                      backend_passed.append(name)

          SEP = "=" * 64
          print(SEP)
          print("AlphaGSM Test Summary")
          print(SEP)

          print("\nSMOKE TESTS")
          print(f"  Passed : {len(smoke_passed)}")
          print(f"  Failed : {len(smoke_failed)}")
          if smoke_passed:
              print("\n  Passed:")
              for t in smoke_passed:
                  print(f"    PASS  {t}")
          if smoke_failed:
              print("\n  Failed:")
              for t in smoke_failed:
                  print(f"    FAIL  {t}")

          print("\nINTEGRATION TESTS")
          print(f"  Passed  : {len(int_passed)}")
          print(f"  Skipped : {len(int_skipped)}")
          print(f"  Failed  : {len(int_failed)}")
          if int_passed:
              print("\n  Passed (server launched successfully):")
              for t in int_passed:
                  print(f"    PASS  {t}")
          if int_skipped:
              print("\n  Skipped:")
              for t, r in int_skipped:
                  print(f"    SKIP  {t}")
                  if r:
                      print(f"          Reason: {r}")
          if int_failed:
              print("\n  Failed:")
              for t, r in int_failed:
                  print(f"    FAIL  {t}")
                  if r:
                      print(f"          Reason: {r}")

          print("\nBACKEND INTEGRATION TESTS")
          print(f"  Passed  : {len(backend_passed)}")
          print(f"  Skipped : {len(backend_skipped)}")
          print(f"  Failed  : {len(backend_failed)}")
          if backend_passed:
              print("\n  Passed:")
              for t in backend_passed:
                  print(f"    PASS  {t}")
          if backend_skipped:
              print("\n  Skipped:")
              for t, r in backend_skipped:
                  print(f"    SKIP  {t}")
                  if r:
                      print(f"          Reason: {r}")
          if backend_failed:
              print("\n  Failed:")
              for t, r in backend_failed:
                  print(f"    FAIL  {t}")
                  if r:
                      print(f"          Reason: {r}")

          total_p = len(smoke_passed) + len(int_passed) + len(backend_passed)
          total_s = len(int_skipped) + len(backend_skipped)
          total_f = len(smoke_failed) + len(int_failed) + len(backend_failed)
          print("\n" + SEP)
          print(f"OVERALL  passed={total_p}  skipped={total_s}  failed={total_f}")
          print(SEP)

          if total_f > 0:
              sys.exit(1)
          PYEOF
