// Team Fortress 2 server.cfg template
// Place this file at: tf/cfg/server.cfg
//
// AlphaGSM-managed settings:
//   servername -> hostname
//   rconpassword -> rcon_password
//   serverpassword -> sv_password

// Server identity
hostname "AlphaGSM TF2 Server"
sv_password ""
rcon_password "changeme"

// Network
sv_maxrate 0
sv_minrate 0
sv_maxupdaterate 66
sv_minupdaterate 10

// Gameplay
mp_timelimit 30
mp_maxrounds 0
mp_autokick 0

// Logging
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
