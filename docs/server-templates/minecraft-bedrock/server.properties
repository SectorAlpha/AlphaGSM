# Minecraft Bedrock Server Properties Template
# Place this file at: <install_dir>/server.properties

# Identity
# Managed by AlphaGSM set commands: server-port, gamemode, difficulty, level-name, max-players, server-name
server-name=AlphaGSM Bedrock Server
motd=AlphaGSM Bedrock Server
level-name=Bedrock level
level-seed=

# Gameplay
gamemode=survival
difficulty=easy
allow-cheats=false
online-mode=true
white-list=false
default-player-permission-level=member
texturepack-required=false

# Network
server-port=19132
server-portv6=19133
enable-lan-visibility=true

# Performance
view-distance=32
tick-distance=4
player-idle-timeout=30
max-threads=8

# Logging / movement
content-log-file-enabled=false
compression-threshold=1
server-authoritative-movement=server-auth
player-movement-score-threshold=20
player-movement-distance-threshold=0.3
player-movement-duration-threshold-in-ms=500
correct-player-movement=false
