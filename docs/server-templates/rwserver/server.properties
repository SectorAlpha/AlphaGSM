# Rising World server.properties template
# Place this file at: <install_dir>/server.properties

# Network
port=4254

# Server identity
name=AlphaGSM Rising World Server
world=world

# Notes
# AlphaGSM launches the server with:
#   --server <world> <port>
# and uses the datastore defaults:
#   servername = AlphaGSM <server name>
#   world = <server name>