# Minecraft Java Server Properties Template
# Place this file at: <install_dir>/server.properties

# Network
server-port=25565
server-ip=
query.port=25565
enable-query=false
enable-rcon=false
rcon.port=25575
rcon.password=changeme

# Server identity
motd=A Minecraft Server
level-name=world
level-seed=
level-type=minecraft\:normal

# Players
max-players=20
online-mode=true
white-list=false
enforce-whitelist=false
player-idle-timeout=0

# Gameplay
gamemode=survival
difficulty=easy
pvp=true
allow-nether=true
spawn-protection=16
spawn-npcs=true
spawn-animals=true
spawn-monsters=true

# Performance
view-distance=10
simulation-distance=10
max-tick-time=60000
network-compression-threshold=256

# Misc
allow-flight=false
enable-command-block=false
force-gamemode=false